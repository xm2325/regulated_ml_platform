apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: triton-credit-risk
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: triton-credit-risk
      app.kubernetes.io/component: gpu-inference
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: inference-api
      ports:
        - {protocol: TCP, port: 8000}
        - {protocol: TCP, port: 8001}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - {protocol: TCP, port: 8002}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
