# Explicit bootstrap trigger after the reviewed merge.
name: Bootstrap and validate platform

on:
  push:
    branches: [main]
    paths:
      - "bundles/**"
      - ".github/workflows/bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: bootstrap-platform-v050
  cancel-in-progress: false

jobs:
  restore-validate-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore and verify complete source tree
        shell: bash
        run: |
          set -euo pipefail
          cat \
            bundles/platform_source_v0.5.0.tar.xz.b64.part001 \
            bundles/platform_source_v0.5.0.tar.xz.b64.part002 \
            | base64 --decode > /tmp/platform_source_v0.5.0.tar.xz
          cat \
            bundles/source_binary_003.bin \
            bundles/source_binary_004.bin \
            bundles/source_binary_005_*.bin \
            >> /tmp/platform_source_v0.5.0.tar.xz
          echo "0785e71b6a733c20be97adee4d75348d7fb5b88aefc531f717516057019756bf  /tmp/platform_source_v0.5.0.tar.xz" | sha256sum --check --strict
          tar -xJf /tmp/platform_source_v0.5.0.tar.xz -C .
          rm -rf bundles
          rm -f .github/workflows/bootstrap.yml
          printf '%s\n' "bootstrap_source_commit=${GITHUB_SHA}" > .bootstrap_complete

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build complete reproducible release snapshot
        run: make all

      - name: Lint and high-severity security check
        run: |
          make lint
          make security

      - uses: docker/setup-buildx-action@v3

      - name: Build local container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          push: false
          tags: regulated-ai-mlops:bootstrap

      - name: Smoke test container
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --rm --name regulated-ai-api -p 8000:8000 regulated-ai-mlops:bootstrap
          trap 'docker logs regulated-ai-api || true; docker stop regulated-ai-api || true' EXIT
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/ready; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Commit complete code, data, models, reports, and site
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Build complete regulated ML platform v0.5.0 [bootstrap complete]"
          git push origin HEAD:main

      - name: Publish container to GHCR
        continue-on-error: true
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag regulated-ai-mlops:bootstrap ghcr.io/xm2325/regulated_ml_platform:0.5.0
          docker tag regulated-ai-mlops:bootstrap ghcr.io/xm2325/regulated_ml_platform:latest
          docker push ghcr.io/xm2325/regulated_ml_platform:0.5.0
          docker push ghcr.io/xm2325/regulated_ml_platform:latest

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  publish-pages:
    needs: restore-validate-commit
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - name: Deploy evidence dashboard
        id: deployment
        uses: actions/deploy-pages@v4
