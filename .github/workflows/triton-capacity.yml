name: Triton concurrency, batching, and capacity evidence

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: triton-capacity-${{ github.ref }}
  cancel-in-progress: true

env:
  TRITON_IMAGE: nvcr.io/nvidia/tritonserver:25.06-py3
  TRITON_SDK_IMAGE: nvcr.io/nvidia/tritonserver:25.06-py3-sdk

jobs:
  triton-capacity:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-runtime.lock
            requirements-dev.txt
            requirements-onnx.txt
      - name: Install model, test, and ONNX dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -r requirements-onnx.txt
      - name: Build validated model and Triton repository
        id: triton_build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          make data features train triton > triton-capacity-build.log 2>&1
          status=$?
          cat triton-capacity-build.log
          exit $status
      - name: Upload Triton build diagnostics on failure
        if: steps.triton_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: triton-capacity-build-diagnostics
          path: triton-capacity-build.log
          retention-days: 7
      - name: Stop after Triton build failure
        if: steps.triton_build.outcome == 'failure'
        run: exit 1
      - name: Pull and record Triton server image
        run: |
          set -euo pipefail
          mkdir -p reports/triton_capacity
          docker pull "${TRITON_IMAGE}"
          docker image inspect "${TRITON_IMAGE}" > reports/triton_capacity/triton_server_image_inspect.json
      - name: Run concurrent HTTP, dynamic batching, Perf Analyzer, and capacity drill
        run: bash scripts/triton_capacity_smoke.sh
      - name: Prove v1.2 capacity evidence is bounded and passing
        run: |
          python - <<'PY'
          import json
          report = json.load(open("reports/triton_capacity/capacity_plan.json"))
          assert report["status"] == "PASS", report
          assert report["checks"]["dynamic_batching_observed"] is True, report
          assert report["checks"]["capacity_point_available"] is True, report
          assert report["perf_analyzer"]["available"] is True, report
          assert report["claim_boundary"]["production_capacity_claim_allowed"] is False, report
          assert report["claim_boundary"]["gpu_capacity_claim_allowed"] is False, report
          assert report["capacity_evidence"]["recommended_reference_replicas"] >= 1, report
          print(json.dumps(report, indent=2))
          PY
      - name: Upload v1.2 Triton capacity evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triton-capacity-evidence
          path: reports/triton_capacity/
          retention-days: 14
