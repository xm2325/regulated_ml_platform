name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-runtime.txt
            requirements-dev.txt
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Restore, rebuild, and test the complete release snapshot
        run: make all
      - name: Run lint
        run: make lint
      - name: Run high-severity static security checks
        run: make security
      - name: Verify release evidence
        run: |
          test -f site/index.html
          test -f reports/promotion_gate.json
          test -f reports/reproducibility_manifest.json
          test -f reports/deployment_validation.json
          test -f docs/release_approval_pack.md
      - uses: actions/upload-artifact@v4
        with:
          name: regulated-ai-evidence
          path: |
            site/
            reports/
            docs/model_card.md
            docs/model_contract.md
            docs/release_approval_pack.md
            docs/reproducibility_manifest.md
          retention-days: 14
