name: Platform build, test, container, and evidence

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: platform-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: regulated-ai-mlops
  IMAGE_TAG: ${{ github.sha }}

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-runtime.lock
            requirements-registry-client.lock
            requirements-mlflow.lock
            requirements-onnx.txt
            requirements.txt
            requirements-dev.txt
      - name: Install development and ONNX export dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -r requirements-onnx.txt
      - name: Generate dated synthetic data and features
        run: make data features
      - name: Train, calibrate, and evaluate out of time
        run: make train
      - name: Export and validate ONNX/Triton serving artifacts
        run: make triton
      - name: Generate monitoring, continuous-ops, alerting, and governance evidence
        run: make reports continuous alerts contract
      - name: Run batch scoring and operational controls
        run: make batch load deployment incident
      - name: Generate interface, SBOM, release pack, and site
        run: make openapi sbom manifest approval site
      - name: Run automated tests
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pytest -q > pytest.log 2>&1
          status=$?
          cat pytest.log
          exit $status
      - name: Upload pytest diagnostics on failure
        if: steps.pytest.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest.log
          retention-days: 7
      - name: Stop after a test failure
        if: steps.pytest.outcome == 'failure'
        run: exit 1
      - name: Ruff lint gate
        id: ruff
        continue-on-error: true
        shell: bash
        run: |
          set +e
          make lint > ruff.log 2>&1
          status=$?
          cat ruff.log
          exit $status
      - name: Upload Ruff diagnostics on failure
        if: steps.ruff.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: ruff.log
          retention-days: 7
      - name: Stop after a Ruff failure
        if: steps.ruff.outcome == 'failure'
        run: exit 1
      - name: Bandit security gate
        run: make security
      - name: Runtime dependency audit
        run: make audit
      - name: ONNX export toolchain dependency audit
        run: make audit-onnx
      - name: Registry server dependency audit
        run: make audit-registry
      - name: Registry client dependency audit
        run: make audit-registry-client
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/model.joblib
            models/metadata.json
            models/model_contract.json
            models/candidates/
            models/triton/
          retention-days: 14
      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: |
            reports/
            docs/model_card.md
            docs/model_contract.md
            docs/release_approval_pack.md
            docs/reproducibility_manifest.md
            docs/slo_error_budget.md
            docs/rollback_policy.md
            docs/runbooks/
          retention-days: 14
      - name: Upload generated site
        uses: actions/upload-artifact@v4
        with:
          name: generated-site
          path: site/
          retention-days: 14

  triton-contract:
    needs: evidence
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: model-artifacts
          path: models
      - name: Build immutable Triton model-repository image
        run: |
          set -euo pipefail
          docker build -f docker/TritonModelRepository.Dockerfile -t regulated-ai-triton-models:${GITHUB_SHA} .
          docker image inspect regulated-ai-triton-models:${GITHUB_SHA} > triton-model-image-inspect.json
      - name: Validate CPU Triton Helm deployment contract
        run: |
          set -euo pipefail
          mkdir -p reports/triton_contract
          helm lint helm/regulated-ai
          helm template regulated-ai helm/regulated-ai \
            --set tritonServing.enabled=true \
            --set tritonServing.accelerator=cpu \
            --set tritonServing.modelRepositoryImage.repository=regulated-ai-triton-models \
            --set tritonServing.modelRepositoryImage.tag=${GITHUB_SHA} \
            > reports/triton_contract/cpu-rendered.yaml
          grep -q 'name: regulated-ai-triton' reports/triton_contract/cpu-rendered.yaml
          grep -q -- '--allow-gpu-metrics=false' reports/triton_contract/cpu-rendered.yaml
          ! grep -q 'nvidia.com/gpu:' reports/triton_contract/cpu-rendered.yaml
      - name: Prove current tree ensemble cannot be forced onto GPU
        shell: bash
        run: |
          set -euo pipefail
          set +e
          helm template regulated-ai helm/regulated-ai \
            --set tritonServing.enabled=true \
            --set tritonServing.accelerator=gpu \
            --set tritonServing.gpuEvidenceApproved=true \
            > reports/triton_contract/current-tree-gpu-render.txt 2>&1
          status=$?
          set -e
          test "$status" -ne 0
          grep -q 'not allowed for the configured modelFamily' reports/triton_contract/current-tree-gpu-render.txt
      - name: Validate future GPU-compatible deployment contract only
        run: |
          set -euo pipefail
          helm template regulated-ai helm/regulated-ai \
            --set tritonServing.enabled=true \
            --set tritonServing.accelerator=gpu \
            --set tritonServing.gpuEvidenceApproved=true \
            --set tritonServing.modelFamily=neural_network \
            > reports/triton_contract/gpu-compatible-rendered.yaml
          grep -q 'nvidia.com/gpu:' reports/triton_contract/gpu-compatible-rendered.yaml
          grep -q 'accelerator: nvidia-a100' reports/triton_contract/gpu-compatible-rendered.yaml
          grep -q -- '--allow-gpu-metrics=true' reports/triton_contract/gpu-compatible-rendered.yaml
      - name: Preserve Triton contract evidence
        run: |
          cp triton-model-image-inspect.json reports/triton_contract/
          cp models/triton/contract.json reports/triton_contract/
          cp models/triton/model_repository/support_base/config.pbtxt reports/triton_contract/support_base_config.pbtxt
          cp models/triton/model_repository/support_calibrator/config.pbtxt reports/triton_contract/support_calibrator_config.pbtxt
          cp models/triton/model_repository/support_ensemble/config.pbtxt reports/triton_contract/support_ensemble_config.pbtxt
      - uses: actions/upload-artifact@v4
        with:
          name: triton-serving-contract-evidence
          path: reports/triton_contract/
          retention-days: 14

  container-and-kind:
    needs: [evidence, triton-contract]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: model-artifacts
          path: models
      - name: Inspect downloaded model artifacts
        run: find models -maxdepth 5 -type f -printf '%p %s bytes\n' | sort
      - name: Build image once
        run: docker build --progress=plain --build-arg GIT_COMMIT="${GITHUB_SHA}" -f docker/Dockerfile -t "${IMAGE_NAME}:${IMAGE_TAG}" .
      - name: Live container smoke test
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --rm --name regulated-ai-api -p 8000:8000 "${IMAGE_NAME}:${IMAGE_TAG}"
          trap 'docker logs regulated-ai-api || true; docker stop regulated-ai-api || true' EXIT
          for _ in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/ready; then
              curl --fail --silent http://127.0.0.1:8000/version
              exit 0
            fi
            sleep 2
          done
          exit 1
      - name: Install kind
        run: |
          curl -Lo kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
      - name: Helm deployment test in kind
        id: kind_smoke
        continue-on-error: true
        shell: bash
        run: |
          set +e
          bash scripts/kind_smoke_test.sh > kind-smoke-test.log 2>&1
          status=$?
          cat kind-smoke-test.log
          exit $status
      - name: Upload kind diagnostic log on failure
        if: steps.kind_smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: kind-smoke-test-log
          path: kind-smoke-test.log
          retention-days: 7
      - name: Stop after a kind failure
        if: steps.kind_smoke.outcome == 'failure'
        run: exit 1
      - name: Build immutable release identity and dev-to-preprod promotion evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/environment_promotion
          export IMAGE_DIGEST
          IMAGE_DIGEST=$(docker image inspect --format='{{.Id}}' "${IMAGE_NAME}:${IMAGE_TAG}")
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from src.operations.gitops_promotion import build_release_identity

          metadata = json.loads(Path("models/metadata.json").read_text(encoding="utf-8"))
          identity = build_release_identity(os.environ["IMAGE_DIGEST"], os.environ["GITHUB_SHA"], metadata)
          Path("reports/environment_promotion/release_identity.json").write_text(json.dumps(identity, indent=2), encoding="utf-8")
          checks = {
              "automated_tests": "PASS",
              "lint": "PASS",
              "security_scan": "PASS",
              "dependency_audit": "PASS",
              "triton_serving_contract": "PASS",
              "container_smoke": "PASS",
              "helm_kind": "PASS",
          }
          Path("reports/environment_promotion/dev_preprod_checks.json").write_text(json.dumps(checks, indent=2), encoding="utf-8")
          PY
          python -m src.operations.gitops_promotion \
            --source dev \
            --target preprod \
            --image-digest "${IMAGE_DIGEST}" \
            --git-commit "${GITHUB_SHA}" \
            --model-metadata models/metadata.json \
            --checks reports/environment_promotion/dev_preprod_checks.json \
            --source-release-identity reports/environment_promotion/release_identity.json \
            --output-json reports/environment_promotion/dev_to_preprod.json \
            --output-md reports/environment_promotion/dev_to_preprod.md
      - name: Upload dev-to-preprod promotion evidence
        uses: actions/upload-artifact@v4
        with:
          name: environment-promotion-preprod
          path: reports/environment_promotion/
          retention-days: 14
      - name: Export the exact tested image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-image
          docker image inspect "${IMAGE_NAME}:${IMAGE_TAG}" > release-image/image-inspect.json
          docker save "${IMAGE_NAME}:${IMAGE_TAG}" | gzip -1 > release-image/tested-container-image.tar.gz
          sha256sum release-image/tested-container-image.tar.gz > release-image/tested-container-image.tar.gz.sha256
      - name: Upload tested image for release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tested-container-image
          path: release-image/
          retention-days: 3
          if-no-files-found: error

  registry-integration:
    needs: evidence
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: model-artifacts
          path: models
      - uses: actions/download-artifact@v8
        with:
          name: release-evidence
          path: .
      - name: Inspect registry release inputs
        run: |
          test -s models/model.joblib
          test -s models/metadata.json
          test -s reports/model_metrics.json
          test -s reports/promotion_gate.json
          test -s reports/continuous_ops_decision.json
          test -s reports/alerting_validation.json
          test -s reports/triton_onnx_parity.json
          test -s reports/accelerator_decision.json
      - name: Exercise registry lifecycle, live API canary, promotion, and rollback
        run: bash scripts/registry_stack_smoke.sh
      - name: Upload registry runtime integration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registry-integration-evidence
          path: reports/registry_integration/
          retention-days: 14

  production-promotion-control:
    needs: [container-and-kind, registry-integration, triton-contract]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime configuration dependency
        run: pip install PyYAML==6.0.3
      - uses: actions/download-artifact@v8
        with:
          name: model-artifacts
          path: models
      - uses: actions/download-artifact@v8
        with:
          name: environment-promotion-preprod
          path: promotion-preprod
      - name: Verify production remains blocked without explicit approval
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/environment_promotion
          python - <<'PY'
          import json
          from pathlib import Path

          checks = {
              "automated_tests": "PASS",
              "lint": "PASS",
              "security_scan": "PASS",
              "dependency_audit": "PASS",
              "triton_serving_contract": "PASS",
              "container_smoke": "PASS",
              "helm_kind": "PASS",
              "registry_integration": "PASS",
              "canary_evidence": "PASS",
              "rollback_drill": "PASS",
          }
          Path("reports/environment_promotion/prod_checks.json").write_text(json.dumps(checks, indent=2), encoding="utf-8")
          PY
          IMAGE_DIGEST=$(python -c 'import json; print(json.load(open("promotion-preprod/release_identity.json"))["image_digest"])')
          set +e
          python -m src.operations.gitops_promotion \
            --source preprod \
            --target prod \
            --image-digest "${IMAGE_DIGEST}" \
            --git-commit "${GITHUB_SHA}" \
            --model-metadata models/metadata.json \
            --checks reports/environment_promotion/prod_checks.json \
            --approval-status pending \
            --source-release-identity promotion-preprod/release_identity.json \
            --output-json reports/environment_promotion/preprod_to_prod_blocked.json \
            --output-md reports/environment_promotion/preprod_to_prod_blocked.md
          status=$?
          set -e
          test "$status" -eq 2
          python - <<'PY'
          import json
          report = json.load(open("reports/environment_promotion/preprod_to_prod_blocked.json"))
          assert report["status"] == "BLOCKED"
          assert report["release_identity"]["image_digest"].startswith("sha256:")
          assert report["manual_approval_required"] is True
          assert "manual production approval is required" in report["reasons"]
          print(json.dumps(report, indent=2))
          PY
      - name: Upload production promotion control evidence
        uses: actions/upload-artifact@v4
        with:
          name: production-promotion-control
          path: reports/environment_promotion/
          retention-days: 14
