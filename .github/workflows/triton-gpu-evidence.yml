name: Roihu GH200 evidence contract (no GPU runtime)

on:
  pull_request:
    paths:
      - ".github/workflows/triton-gpu-evidence.yml"
      - ".github/workflows/platform.yml"
      - "config/roihu_gpu_evidence_policy.yaml"
      - "docs/roihu_gpu_evidence.md"
      - "hpc/roihu/**"
      - "helm/regulated-ai/**"
      - "scripts/prepare_roihu_source_bundle.sh"
      - "src/operations/roihu_gpu_evidence.py"
      - "tests/test_v13_gpu_platform.py"
      - "tests/test_v13_gpu_workflow.py"
      - "tests/test_v13_roihu_bundle.py"
      - "tests/test_v13_roihu_gpu_evidence.py"
      - "requirements*.txt"
      - "pyproject.toml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/triton-gpu-evidence.yml"
      - ".github/workflows/platform.yml"
      - "config/roihu_gpu_evidence_policy.yaml"
      - "docs/roihu_gpu_evidence.md"
      - "hpc/roihu/**"
      - "helm/regulated-ai/**"
      - "scripts/prepare_roihu_source_bundle.sh"
      - "src/operations/roihu_gpu_evidence.py"
      - "tests/test_v13_gpu_platform.py"
      - "tests/test_v13_gpu_workflow.py"
      - "tests/test_v13_roihu_bundle.py"
      - "tests/test_v13_roihu_gpu_evidence.py"
      - "requirements*.txt"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: roihu-gpu-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-and-validator:
    # GitHub-hosted CPU runner only. Real GPU evidence must originate from CSC
    # Roihu Slurm; this job neither executes nor proves a real GPU workload.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install contract validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Lint Roihu contracts and shell entrypoints
        run: |
          set -euo pipefail
          ruff check \
            src/operations/roihu_gpu_evidence.py \
            hpc/roihu \
            tests/test_v13_gpu_platform.py \
            tests/test_v13_gpu_workflow.py \
            tests/test_v13_roihu_bundle.py \
            tests/test_v13_roihu_gpu_evidence.py
          ruff format --check \
            src/operations/roihu_gpu_evidence.py \
            tests/test_v13_gpu_platform.py \
            tests/test_v13_gpu_workflow.py \
            tests/test_v13_roihu_bundle.py \
            tests/test_v13_roihu_gpu_evidence.py
          bash -n scripts/prepare_roihu_source_bundle.sh
          find hpc/roihu -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
          find hpc/roihu -type f -name '*.sbatch' -print0 | xargs -0 -r -n1 bash -n
      - name: Validate v1.3 evidence policy and fail-closed CLI contract
        run: |
          set -euo pipefail
          python -m src.operations.roihu_gpu_evidence --help
          python -m pytest -q \
            tests/test_v13_gpu_platform.py \
            tests/test_v13_gpu_workflow.py \
            tests/test_v13_roihu_bundle.py \
            tests/test_v13_roihu_gpu_evidence.py
      - name: Build immutable source-bundle contract
        run: |
          set -euo pipefail
          bash scripts/prepare_roihu_source_bundle.sh "${RUNNER_TEMP}/roihu-source"
          cd "${RUNNER_TEMP}/roihu-source"
          sha256sum --check regulated-ml-platform-*.tar.gz.sha256
      - name: Record GitHub-hosted claim boundary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "schema_version": "regulated-ml-platform.github-gpu-contract/v1",
              "source_commit": os.environ["SOURCE_SHA"],
              "runner_scope": "github-hosted-contract-validation-only",
              "executes_roihu_slurm_job": False,
              "executes_gpu_workload": False,
              "proves_real_gpu": False,
              "accepted_real_evidence_origin": "CSC Roihu Slurm gpumedium/gpularge",
          }
          destination = Path(os.environ["RUNNER_TEMP"]) / "roihu-source" / "github-claim-boundary.json"
          destination.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
      - name: Upload contract artifact (not GPU evidence)
        uses: actions/upload-artifact@v4
        with:
          name: roihu-source-contract-not-gpu-evidence-${{ env.SOURCE_SHA }}
          path: ${{ runner.temp }}/roihu-source/
          if-no-files-found: error
          retention-days: 14
