name: GitOps, progressive delivery, and GPU contract

on:
  push:
    branches: [main]
    paths:
      - "VERSION"
      - "gitops/**"
      - "serving/triton/**"
      - "monitoring/**"
      - "src/operations/canary_gate.py"
      - "config/canary_gate.yaml"
      - "scripts/update_gitops_image.py"
      - "tests/test_progressive_delivery.py"
      - "tests/test_gitops_image_update.py"
      - ".github/workflows/gitops.yml"
  pull_request:
    paths:
      - "VERSION"
      - "gitops/**"
      - "serving/triton/**"
      - "monitoring/**"
      - "src/operations/canary_gate.py"
      - "config/canary_gate.yaml"
      - "scripts/update_gitops_image.py"
      - "tests/test_progressive_delivery.py"
      - "tests/test_gitops_image_update.py"
      - ".github/workflows/gitops.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitops-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install bounded validation dependencies
        run: python -m pip install "pytest>=8,<10" "PyYAML==6.0.3"
      - name: Run progressive-delivery and digest-promotion tests
        run: pytest -q tests/test_progressive_delivery.py tests/test_gitops_image_update.py
      - name: Verify source release declarations
        run: python scripts/check_release_consistency.py
      - name: Exercise pass and fail-closed canary decisions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/gitops
          python -m src.operations.canary_gate \
            --metrics examples/canary_metrics_pass.json \
            --config config/canary_gate.yaml \
            --output reports/gitops/canary-pass.json
          set +e
          python -m src.operations.canary_gate \
            --metrics examples/canary_metrics_rollback.json \
            --config config/canary_gate.yaml \
            --output reports/gitops/canary-rollback.json
          status=$?
          set -e
          test "${status}" -eq 2
      - name: Render every environment from Git
        shell: bash
        run: |
          set -euo pipefail
          kubectl version --client
          for environment in dev preprod prod; do
            kubectl kustomize "gitops/environments/${environment}" > "reports/gitops/${environment}.yaml"
            test -s "reports/gitops/${environment}.yaml"
            ! grep -q "triton-credit-risk" "reports/gitops/${environment}.yaml"
          done
          kubectl kustomize gitops/gpu > reports/gitops/gpu-contract.yaml
          grep -q "triton-credit-risk" reports/gitops/gpu-contract.yaml
          cp gitops/argocd/*.yaml reports/gitops/
          cp monitoring/alert_rules.yml reports/gitops/
          cp monitoring/grafana/dashboards/progressive-delivery.json reports/gitops/
      - name: Upload rendered control evidence
        uses: actions/upload-artifact@v4
        with:
          name: gitops-progressive-delivery-evidence
          path: reports/gitops/
          retention-days: 14
          if-no-files-found: error
