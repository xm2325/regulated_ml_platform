{{- $inferenceResources := deepCopy .Values.resources -}}
{{- if .Values.inferenceScheduling.gpu.enabled -}}
{{- $_ := set $inferenceResources.requests .Values.inferenceScheduling.gpu.resourceName .Values.inferenceScheduling.gpu.count -}}
{{- $_ := set $inferenceResources.limits .Values.inferenceScheduling.gpu.resourceName .Values.inferenceScheduling.gpu.count -}}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: regulated-ai-api
  labels: {app: regulated-ai-api}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 0, maxSurge: 1}
  selector:
    matchLabels: {app: regulated-ai-api}
  template:
    metadata:
      labels: {app: regulated-ai-api}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: false
      priorityClassName: {{ .Values.inferenceScheduling.priorityClassName | quote }}
{{- if .Values.inferenceScheduling.gpu.enabled }}
      nodeSelector:
{{ toYaml .Values.inferenceScheduling.gpu.nodeSelector | indent 8 }}
      tolerations:
{{ toYaml .Values.inferenceScheduling.gpu.tolerations | indent 8 }}
{{- else }}
{{- with .Values.inferenceScheduling.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.inferenceScheduling.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
{{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: MODEL_SOURCE
              value: {{ ternary "registry" "local" .Values.registryRuntime.enabled | quote }}
{{- if .Values.registryRuntime.enabled }}
            - name: MLFLOW_TRACKING_URI
              value: {{ .Values.registryRuntime.trackingUri | quote }}
            - name: MLFLOW_REGISTRY_URI
              value: {{ .Values.registryRuntime.registryUri | quote }}
            - name: MLFLOW_REGISTERED_MODEL_NAME
              value: {{ .Values.registryRuntime.registeredModelName | quote }}
            - name: MLFLOW_CHAMPION_ALIAS
              value: {{ .Values.registryRuntime.championAlias | quote }}
            - name: MLFLOW_CHALLENGER_ALIAS
              value: {{ .Values.registryRuntime.challengerAlias | quote }}
            - name: REGISTRY_CACHE_DIR
              value: "/var/lib/regulated-ai/registry-cache"
            - name: REGISTRY_STRICT_STARTUP
              value: {{ .Values.registryRuntime.strictStartup | quote }}
            - name: REGISTRY_HOT_RELOAD_ENABLED
              value: {{ .Values.registryRuntime.hotReloadEnabled | quote }}
            - name: REGISTRY_RELOAD_INTERVAL_SECONDS
              value: {{ .Values.registryRuntime.reloadIntervalSeconds | quote }}
            - name: CANARY_ENABLED
              value: {{ .Values.registryRuntime.canary.enabled | quote }}
            - name: CANARY_TRAFFIC_PERCENT
              value: {{ .Values.registryRuntime.canary.trafficPercent | quote }}
            - name: CANARY_ASSIGNMENT_SEED
              value: {{ .Values.registryRuntime.canary.assignmentSeed | quote }}
            - name: CANARY_MIN_REQUESTS
              value: {{ .Values.registryRuntime.canary.minRequests | quote }}
            - name: CANARY_MIN_CHALLENGER_REQUESTS
              value: {{ .Values.registryRuntime.canary.minChallengerRequests | quote }}
            - name: CANARY_WINDOW_SIZE
              value: {{ .Values.registryRuntime.canary.windowSize | quote }}
            - name: CANARY_MAX_ACTION_DISAGREEMENT_RATE
              value: {{ .Values.registryRuntime.canary.maxActionDisagreementRate | quote }}
            - name: CANARY_MAX_PROBABILITY_DELTA_P95
              value: {{ .Values.registryRuntime.canary.maxProbabilityDeltaP95 | quote }}
            - name: CANARY_MAX_CHALLENGER_ERROR_RATE
              value: {{ .Values.registryRuntime.canary.maxChallengerErrorRate | quote }}
            - name: CANARY_MAX_LATENCY_RATIO
              value: {{ .Values.registryRuntime.canary.maxLatencyRatio | quote }}
            - name: CANARY_MAX_MANUAL_REVIEW_RATE_INCREASE
              value: {{ .Values.registryRuntime.canary.maxManualReviewRateIncrease | quote }}
            - name: CANARY_AUTO_PROMOTE_ENABLED
              value: {{ .Values.registryRuntime.canary.autoPromoteEnabled | quote }}
            - name: CANARY_EVALUATION_INTERVAL_SECONDS
              value: {{ .Values.registryRuntime.canary.evaluationIntervalSeconds | quote }}
            - name: CANARY_REFRESH_INTERVAL_SECONDS
              value: {{ .Values.registryRuntime.canary.refreshIntervalSeconds | quote }}
{{- end }}
          ports:
            - {name: http, containerPort: 8000}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities: {drop: ["ALL"]}
          startupProbe:
            httpGet: {path: /ready, port: http}
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet: {path: /ready, port: http}
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 20
          resources:
{{ toYaml $inferenceResources | indent 12 }}
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
{{- if .Values.registryRuntime.enabled }}
            - {name: registry-cache, mountPath: /var/lib/regulated-ai/registry-cache}
{{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
{{- if .Values.registryRuntime.enabled }}
        - name: registry-cache
          emptyDir:
            sizeLimit: {{ .Values.registryRuntime.cache.sizeLimit | quote }}
{{- end }}
