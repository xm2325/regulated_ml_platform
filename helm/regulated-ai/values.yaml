image:
  repository: ghcr.io/xm2325/regulated_ml_platform
  tag: "service-1.0.0"
  pullPolicy: IfNotPresent
replicaCount: 2
serviceAccount:
  create: true
  name: regulated-ai-mlops
service:
  type: ClusterIP
  port: 80
podDisruptionBudget:
  enabled: true
  minAvailable: 1
networkPolicy:
  enabled: true
  mlflowEgress:
    enabled: false
    namespace: mlops
    podLabel: mlflow
    port: 5000
registryRuntime:
  enabled: false
  trackingUri: "http://mlflow.mlops.svc.cluster.local:5000"
  registryUri: "http://mlflow.mlops.svc.cluster.local:5000"
  registeredModelName: "regulated-targeted-support-model"
  championAlias: "champion"
  challengerAlias: "challenger"
  strictStartup: true
  hotReloadEnabled: true
  reloadIntervalSeconds: 30
  cache:
    sizeLimit: "1Gi"
  canary:
    enabled: false
    trafficPercent: 5
    assignmentSeed: "regulated-ai-canary-v1"
    minRequests: 200
    minChallengerRequests: 10
    windowSize: 1000
    maxActionDisagreementRate: 0.05
    maxProbabilityDeltaP95: 0.15
    maxChallengerErrorRate: 0.01
    maxLatencyRatio: 2.0
    maxManualReviewRateIncrease: 0.10
    autoPromoteEnabled: false
    evaluationIntervalSeconds: 15
    refreshIntervalSeconds: 30
resources:
  requests: {cpu: "250m", memory: "384Mi"}
  limits: {cpu: "1", memory: "1Gi"}
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 65
priorityClasses:
  create: true
  inference:
    name: regulated-ai-inference
    value: 100000
  training:
    name: regulated-ai-training
    value: 1000
resourceQuota:
  enabled: true
  hard:
    requestsCpu: "8"
    requestsMemory: "12Gi"
    limitsCpu: "16"
    limitsMemory: "24Gi"
inferenceScheduling:
  priorityClassName: regulated-ai-inference
  nodeSelector: {}
  tolerations: []
  gpu:
    enabled: false
    resourceName: nvidia.com/gpu
    count: 1
    nodeSelector:
      accelerator: nvidia-a100
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
trainingJob:
  enabled: false
  schedule: "0 3 * * *"
  suspend: true
  priorityClassName: regulated-ai-training
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  dataPvcName: regulated-ai-training-data
  outputPvcName: regulated-ai-training-output
  command:
    - python
    - -m
    - src.models.train
    - --input
    - /training-data/features.csv
    - --model-dir
    - /training-output/models
    - --reports-dir
    - /training-output/reports
  resources:
    requests: {cpu: "1", memory: "2Gi"}
    limits: {cpu: "4", memory: "8Gi"}
  nodeSelector: {}
  tolerations: []
  gpu:
    enabled: false
    resourceName: nvidia.com/gpu
    count: 1
    nodeSelector:
      accelerator: nvidia-a100
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
