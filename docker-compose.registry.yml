name: regulated-ml-registry

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow-local-password
    volumes:
      - mlflow-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mlflow
      MINIO_ROOT_PASSWORD: mlflow-local-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mlflow-minio:/data
    restart: unless-stopped

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 mlflow mlflow-local-secret; do sleep 2; done
        mc mb --ignore-existing local/mlflow-artifacts
        mc anonymous set none local/mlflow-artifacts
    restart: "no"

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: mlflow
      AWS_SECRET_ACCESS_KEY: mlflow-local-secret
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command:
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - postgresql+psycopg2://mlflow:mlflow-local-password@postgres:5432/mlflow
      - --artifacts-destination
      - s3://mlflow-artifacts
      - --allowed-hosts
      - mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 60
    restart: unless-stopped

  registry-cli:
    profiles: ["registry"]
    build:
      context: .
      dockerfile: docker/Dockerfile.registry
    depends_on:
      mlflow:
        condition: service_healthy
    working_dir: /workspace
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_REGISTRY_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: regulated-targeted-support
      MLFLOW_REGISTERED_MODEL_NAME: regulated-targeted-support-model
    volumes:
      - .:/workspace

  api-registry-runtime:
    profiles: ["runtime"]
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        GIT_COMMIT: local-registry-integration
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MODEL_SOURCE: registry
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_REGISTRY_URI: http://mlflow:5000
      MLFLOW_REGISTERED_MODEL_NAME: regulated-targeted-support-model
      MLFLOW_CHAMPION_ALIAS: champion
      MLFLOW_CHALLENGER_ALIAS: challenger
      REGISTRY_CACHE_DIR: /var/lib/regulated-ai/registry-cache
      REGISTRY_STRICT_STARTUP: "true"
      REGISTRY_HOT_RELOAD_ENABLED: "true"
      REGISTRY_RELOAD_INTERVAL_SECONDS: "2"
      CANARY_ENABLED: "true"
      CANARY_TRAFFIC_PERCENT: "50"
      CANARY_MIN_REQUESTS: "8"
      CANARY_MIN_CHALLENGER_REQUESTS: "2"
      CANARY_WINDOW_SIZE: "100"
      CANARY_MAX_ACTION_DISAGREEMENT_RATE: "0.01"
      CANARY_MAX_PROBABILITY_DELTA_P95: "0.01"
      CANARY_MAX_CHALLENGER_ERROR_RATE: "0.0"
      CANARY_MAX_LATENCY_RATIO: "20.0"
      CANARY_MAX_MANUAL_REVIEW_RATE_INCREASE: "0.01"
      CANARY_AUTO_PROMOTE_ENABLED: "true"
      CANARY_EVALUATION_INTERVAL_SECONDS: "10"
      CANARY_REFRESH_INTERVAL_SECONDS: "1"
    ports:
      - "8002:8000"
    volumes:
      - registry-api-cache:/var/lib/regulated-ai/registry-cache
    restart: unless-stopped

volumes:
  mlflow-postgres:
  mlflow-minio:
  registry-api-cache:
