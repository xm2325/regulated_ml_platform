apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: regulated-ai-mlops-default-deny
spec:
  podSelector:
    matchLabels:
      app: regulated-ai-mlops
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
